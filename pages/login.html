<script>
        function switchTab(type) {
            const phoneTab = document.getElementById('tab-phone');
            const emailTab = document.getElementById('tab-email');
            const phoneForm = document.getElementById('form-phone');
            const emailForm = document.getElementById('form-email');

            if (type === 'phone') {
                phoneTab.classList.add('active-tab');
                phoneTab.classList.remove('text-on-surface-variant');
                emailTab.classList.remove('active-tab');
                emailTab.classList.add('text-on-surface-variant');

                phoneForm.classList.replace('opacity-0', 'opacity-100');
                phoneForm.classList.replace('-translate-x-full', 'translate-x-0');
                phoneForm.classList.remove('absolute', 'pointer-events-none');

                emailForm.classList.replace('opacity-100', 'opacity-0');
                emailForm.classList.replace('translate-x-0', 'translate-x-full');
                emailForm.classList.add('absolute', 'pointer-events-none');
            } else {
                emailTab.classList.add('active-tab');
                emailTab.classList.remove('text-on-surface-variant');
                phoneTab.classList.remove('active-tab');
                phoneTab.classList.add('text-on-surface-variant');

                emailForm.classList.replace('opacity-0', 'opacity-100');
                emailForm.classList.replace('translate-x-full', 'translate-x-0');
                emailForm.classList.remove('absolute', 'pointer-events-none');

                phoneForm.classList.replace('opacity-100', 'opacity-0');
                phoneForm.classList.replace('translate-x-0', '-translate-x-full');
                phoneForm.classList.add('absolute', 'pointer-events-none');
            }
        }

        // Countdown micro-interaction for Send Code
        const sendBtn = document.getElementById('send-code-btn');
        let isCounting = false;

        sendBtn.addEventListener('click', () => {
            if (isCounting) return;
            
            isCounting = true;
            let seconds = 60;
            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            const timer = setInterval(() => {
                seconds--;
                sendBtn.textContent = `${seconds}s 后重新获取`;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    isCounting = false;
                    sendBtn.textContent = '获取验证码';
                    sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }, 1000);
        });
    </script>
