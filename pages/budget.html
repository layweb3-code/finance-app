<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>预算管理 - 记账本</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hanken+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #F8FAFC; }
        .progress-bar { transition: width 0.5s ease; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; }
        .modal.active { display: flex; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "secondary": "#006c49",
                        "surface": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "surface-container-low": "#eff4ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-border": "#E2E8F0",
                        "on-surface": "#0b1c30",
                        "on-surface-variant": "#45464d",
                        "income-glance": "#D1FAE5",
                        "expense-glance": "#FFE4E6",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-numeric": ["JetBrains Mono"],
                        "label-sm": ["Inter"]
                    },
                    fontSize: {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-numeric": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    },
                    spacing: {
                        "container-margin": "16px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "32px"
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body-md text-on-surface min-h-screen pb-24">
    <header class="w-full sticky top-0 z-40 bg-surface">
        <div class="flex justify-between items-center px-container-margin py-stack-md w-full max-w-[1200px] mx-auto">
            <div class="flex items-center gap-stack-sm">
                <span class="material-symbols-outlined text-primary">account_balance</span>
                <h1 class="font-headline-md text-headline-md text-primary" id="currentMonth">2024年3月</h1>
            </div>
            <button onclick="openDatePicker()" class="hover:bg-surface-container-low transition-colors p-2 rounded-full">
                <span class="material-symbols-outlined text-on-surface-variant">calendar_month</span>
            </button>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-container-margin space-y-stack-lg">
        <!-- Overall Monthly Budget -->
        <section class="mt-stack-md">
            <div class="bg-surface-container-lowest border border-surface-border rounded-xl p-stack-lg shadow-sm">
                <div class="flex justify-between items-end mb-stack-md">
                    <div>
                        <p class="font-label-sm text-label-sm text-on-surface-variant mb-1">月度总预算</p>
                        <h2 class="font-display-lg text-display-lg text-primary font-label-numeric" id="totalBudgetDisplay">¥5,200.00</h2>
                    </div>
                    <div class="text-right">
                        <p class="font-label-numeric text-label-numeric text-primary" id="usagePercent">0% 已用</p>
                        <p class="font-label-sm text-label-sm text-on-surface-variant" id="remainingDays">本月剩余</p>
                    </div>
                </div>
                <!-- Main Progress Bar -->
                <div class="w-full h-4 bg-surface-container rounded-full overflow-hidden mb-stack-md">
                    <div class="progress-bar h-full bg-primary" id="mainProgressBar" style="width: 0%"></div>
                </div>
                <div class="flex flex-wrap gap-stack-md">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-primary"></div>
                        <span class="text-label-sm text-on-surface-variant">支出</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-surface-container"></div>
                        <span class="text-label-sm text-on-surface-variant">限额</span>
                    </div>
                    <button onclick="editTotalBudget()" class="ml-auto text-primary font-semibold flex items-center gap-1 hover:underline">
                        <span class="material-symbols-outlined text-[18px]">edit</span>
                        <span class="text-label-sm">编辑总预算</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Category Budgets Grid -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-stack-md" id="categoryBudgets">
            <!-- Category budgets will be rendered here -->
        </section>

        <!-- Add New Category Budget -->
        <section>
            <button onclick="openAddCategoryModal()" class="w-full group border-2 border-dashed border-surface-border hover:border-primary rounded-xl p-stack-lg flex flex-col items-center justify-center gap-stack-sm text-on-surface-variant hover:text-primary transition-all">
                <div class="p-3 bg-surface-container group-hover:bg-surface-container-high rounded-full transition-colors">
                    <span class="material-symbols-outlined text-[32px]">add_circle</span>
                </div>
                <span class="font-headline-sm text-headline-sm">添加分类预算</span>
            </button>
        </section>

        <!-- Budget Insights -->
        <section>
            <div class="bg-surface-container-lowest border border-surface-border rounded-xl p-stack-lg shadow-sm">
                <h3 class="font-headline-sm text-headline-sm text-primary mb-stack-md">预算洞察</h3>
                <div class="space-y-stack-md" id="budgetInsights">
                    <!-- Insights will be rendered here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full z-50 bg-surface-container-lowest border-t border-surface-border">
        <div class="flex justify-around items-center h-16 w-full px-4 max-w-[1200px] mx-auto">
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80" href="home.html">
                <span class="material-symbols-outlined">home_storage</span>
                <span class="font-label-sm text-label-sm">首页</span>
            </a>
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80" href="stats.html">
                <span class="material-symbols-outlined">equalizer</span>
                <span class="font-label-sm text-label-sm">统计</span>
            </a>
            <a class="flex flex-col items-center justify-center text-primary font-semibold" href="budget.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
                <span class="font-label-sm text-label-sm">预算</span>
            </a>
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80" href="profile.html">
                <span class="material-symbols-outlined">person</span>
                <span class="font-label-sm text-label-sm">我的</span>
            </a>
        </div>
    </nav>

    <!-- Edit Total Budget Modal -->
    <div id="editBudgetModal" class="modal items-center justify-center">
        <div class="absolute inset-0 bg-black/50" onclick="closeEditBudgetModal()"></div>
        <div class="relative bg-white rounded-xl p-6 max-w-sm w-full mx-4">
            <h3 class="font-headline-md text-headline-md text-primary mb-4">设置月度总预算</h3>
            <div class="mb-4">
                <label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block">预算金额</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">¥</span>
                    <input type="number" id="totalBudgetInput" placeholder="0.00" step="100" min="0"
                        class="w-full pl-10 pr-4 py-3 border border-surface-border rounded-xl focus:outline-none focus:border-primary font-label-numeric">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeEditBudgetModal()" class="flex-1 py-3 border border-surface-border rounded-xl hover:bg-surface-container">取消</button>
                <button onclick="saveTotalBudget()" class="flex-1 py-3 bg-primary text-on-primary rounded-xl hover:opacity-90">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Category Budget Modal -->
    <div id="addCategoryModal" class="modal items-center justify-center">
        <div class="absolute inset-0 bg-black/50" onclick="closeAddCategoryModal()"></div>
        <div class="relative bg-white rounded-xl p-6 max-w-sm w-full mx-4">
            <h3 class="font-headline-md text-headline-md text-primary mb-4">添加分类预算</h3>
            <div class="mb-4">
                <label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block">选择分类</label>
                <select id="categorySelect" class="w-full px-4 py-3 border border-surface-border rounded-xl focus:outline-none focus:border-primary">
                    <!-- Options will be rendered here -->
                </select>
            </div>
            <div class="mb-4">
                <label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block">预算金额</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">¥</span>
                    <input type="number" id="categoryBudgetInput" placeholder="0.00" step="50" min="0"
                        class="w-full pl-10 pr-4 py-3 border border-surface-border rounded-xl focus:outline-none focus:border-primary font-label-numeric">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeAddCategoryModal()" class="flex-1 py-3 border border-surface-border rounded-xl hover:bg-surface-container">取消</button>
                <button onclick="saveCategoryBudget()" class="flex-1 py-3 bg-primary text-on-primary rounded-xl hover:opacity-90">保存</button>
            </div>
        </div>
    </div>

    <!-- Date Picker Modal -->
    <div id="datePickerModal" class="modal items-center justify-center">
        <div class="absolute inset-0 bg-black/50" onclick="closeDatePicker()"></div>
        <div class="relative bg-white rounded-xl p-6 max-w-sm w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-headline-md text-headline-md text-primary">选择月份</h2>
                <button onclick="closeDatePicker()" class="p-2 hover:bg-surface-container rounded-full">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="grid grid-cols-3 gap-3" id="monthGrid"></div>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'food', name: '餐饮', icon: 'restaurant' },
            { id: 'transport', name: '交通', icon: 'directions_car' },
            { id: 'shopping', name: '购物', icon: 'shopping_bag' },
            { id: 'housing', name: '居住', icon: 'house' },
            { id: 'entertainment', name: '娱乐', icon: 'movie' },
            { id: 'medical', name: '医疗', icon: 'local_hospital' },
            { id: 'education', name: '教育', icon: 'school' },
            { id: 'social', name: '人情', icon: 'card_giftcard' },
            { id: 'other-expense', name: '其他', icon: 'more_horiz' }
        ];

        let budgets = JSON.parse(localStorage.getItem('budgets') || '{}');
        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
        let selectedMonth = new Date().toISOString().slice(0, 7);

        function init() {
            if (!budgets.total) budgets.total = 5200;
            if (!budgets.categories) budgets.categories = {
                food: 800,
                entertainment: 400,
                transport: 250,
                housing: 2000
            };
            saveBudgets();
            renderMonths();
            updateBudget();
        }

        function saveBudgets() {
            localStorage.setItem('budgets', JSON.stringify(budgets));
        }

        function updateBudget() {
            document.getElementById('currentMonth').textContent = selectedMonth.replace('-', '年') + '月';

            const monthTransactions = transactions.filter(t => t.date.startsWith(selectedMonth) && t.type === 'expense');
            const totalExpense = monthTransactions.reduce((sum, t) => sum + t.amount, 0);
            const totalBudget = budgets.total;
            const percentage = totalBudget > 0 ? Math.min((totalExpense / totalBudget) * 100, 100) : 0;

            document.getElementById('totalBudgetDisplay').textContent = formatCurrency(totalBudget);
            document.getElementById('usagePercent').textContent = `${percentage.toFixed(0)}% 已用`;
            document.getElementById('mainProgressBar').style.width = `${percentage}%`;

            if (percentage >= 90) {
                document.getElementById('mainProgressBar').classList.remove('bg-primary');
                document.getElementById('mainProgressBar').classList.add('bg-error');
            } else {
                document.getElementById('mainProgressBar').classList.remove('bg-error');
                document.getElementById('mainProgressBar').classList.add('bg-primary');
            }

            renderCategoryBudgets(monthTransactions);
            renderInsights(monthTransactions, totalExpense, totalBudget);
        }

        function renderCategoryBudgets(monthTransactions) {
            const container = document.getElementById('categoryBudgets');
            const categoryExpenses = {};

            monthTransactions.forEach(t => {
                if (!categoryExpenses[t.categoryId]) categoryExpenses[t.categoryId] = 0;
                categoryExpenses[t.categoryId] += t.amount;
            });

            const budgetEntries = Object.entries(budgets.categories || {}).map(([catId, budget]) => {
                const cat = categories.find(c => c.id === catId);
                const spent = categoryExpenses[catId] || 0;
                const percentage = budget > 0 ? Math.min((spent / budget) * 100, 100) : 0;
                const remaining = Math.max(budget - spent, 0);

                return { catId, cat, budget, spent, percentage, remaining };
            });

            container.innerHTML = budgetEntries.map(({ catId, cat, budget, spent, percentage, remaining }) => `
                <div class="bg-surface-container-lowest border border-surface-border rounded-xl p-stack-md flex flex-col justify-between">
                    <div class="flex justify-between items-start mb-stack-md">
                        <div class="flex items-center gap-stack-sm">
                            <div class="p-2 bg-surface-container rounded-lg">
                                <span class="material-symbols-outlined text-primary">${cat?.icon || 'more_horiz'}</span>
                            </div>
                            <div>
                                <h3 class="font-headline-sm text-headline-sm text-primary">${cat?.name || '未分类'}</h3>
                                <p class="text-label-sm text-on-surface-variant">每月限额 ${formatCurrency(budget)}</p>
                            </div>
                        </div>
                        <button onclick="editCategoryBudget('${catId}')" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full">edit</button>
                    </div>
                    <div>
                        <div class="flex justify-between mb-1">
                            <span class="font-label-numeric text-label-numeric ${percentage >= 90 ? 'text-error' : 'text-primary'} font-bold">${formatCurrency(spent)}</span>
                            <span class="font-label-sm text-label-sm text-on-surface-variant">剩余 ${formatCurrency(remaining)}</span>
                        </div>
                        <div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
                            <div class="progress-bar h-full ${percentage >= 90 ? 'bg-error' : 'bg-primary'}" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                </div>
            `).join('') + `
                <button onclick="openAddCategoryModal()" class="group border-2 border-dashed border-surface-border hover:border-primary rounded-xl p-stack-md flex flex-col items-center justify-center gap-stack-sm text-on-surface-variant hover:text-primary transition-all">
                    <span class="material-symbols-outlined text-[24px]">add_circle</span>
                    <span class="text-label-sm">添加分类</span>
                </button>
            `;
        }

        function renderInsights(monthTransactions, totalExpense, totalBudget) {
            const container = document.getElementById('budgetInsights');
            const insights = [];

            if (totalExpense > totalBudget * 0.8 && totalExpense <= totalBudget) {
                insights.push({ type: 'warning', text: `本月支出已达预算的 ${((totalExpense / totalBudget) * 100).toFixed(0)}%，请注意控制支出。` });
            } else if (totalExpense > totalBudget) {
                insights.push({ type: 'error', text: `本月支出已超出预算 ${formatCurrency(totalExpense - totalBudget)}！` });
            } else {
                insights.push({ type: 'success', text: `预算执行良好，还剩余 ${formatCurrency(totalBudget - totalExpense)} 可用。` });
            }

            // Category insights
            Object.entries(budgets.categories || {}).forEach(([catId, budget]) => {
                const cat = categories.find(c => c.id === catId);
                const spent = monthTransactions.filter(t => t.categoryId === catId).reduce((sum, t) => sum + t.amount, 0);
                if (spent > budget * 0.9) {
                    insights.push({ type: 'warning', text: `${cat?.name}分类预算已使用 ${((spent / budget) * 100).toFixed(0)}%。` });
                }
            });

            container.innerHTML = insights.map(insight => `
                <div class="flex items-start gap-stack-md">
                    <span class="material-symbols-outlined ${insight.type === 'error' ? 'text-error' : insight.type === 'warning' ? 'text-orange-500' : 'text-secondary'} mt-1" style="font-variation-settings: 'FILL' 1">
                        ${insight.type === 'error' ? 'error' : insight.type === 'warning' ? 'warning' : 'check_circle'}
                    </span>
                    <p class="text-body-md text-on-surface">${insight.text}</p>
                </div>
            `).join('');
        }

        function editTotalBudget() {
            document.getElementById('totalBudgetInput').value = budgets.total;
            document.getElementById('editBudgetModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeEditBudgetModal() {
            document.getElementById('editBudgetModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function saveTotalBudget() {
            const amount = parseFloat(document.getElementById('totalBudgetInput').value);
            if (amount > 0) {
                budgets.total = amount;
                saveBudgets();
                closeEditBudgetModal();
                updateBudget();
            }
        }

        function openAddCategoryModal() {
            const select = document.getElementById('categorySelect');
            const usedCategories = Object.keys(budgets.categories || {});
            const available = categories.filter(c => !usedCategories.includes(c.id));

            select.innerHTML = available.map(c => `
                <option value="${c.id}">${c.name}</option>
            `).join('');

            if (available.length === 0) {
                alert('所有分类已添加预算');
                return;
            }

            document.getElementById('categoryBudgetInput').value = '';
            document.getElementById('addCategoryModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAddCategoryModal() {
            document.getElementById('addCategoryModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function saveCategoryBudget() {
            const catId = document.getElementById('categorySelect').value;
            const amount = parseFloat(document.getElementById('categoryBudgetInput').value);
            if (catId && amount > 0) {
                if (!budgets.categories) budgets.categories = {};
                budgets.categories[catId] = amount;
                saveBudgets();
                closeAddCategoryModal();
                updateBudget();
            }
        }

        function editCategoryBudget(catId) {
            const amount = prompt(`设置${categories.find(c => c.id === catId)?.name}预算金额：`, budgets.categories[catId] || 0);
            if (amount !== null && parseFloat(amount) >= 0) {
                budgets.categories[catId] = parseFloat(amount);
                saveBudgets();
                updateBudget();
            }
        }

        function openDatePicker() {
            document.getElementById('datePickerModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDatePicker() {
            document.getElementById('datePickerModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderMonths() {
            const grid = document.getElementById('monthGrid');
            const months = [];
            const now = new Date();
            for (let i = 0; i < 12; i++) {
                const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push(date.toISOString().slice(0, 7));
            }
            grid.innerHTML = months.map(m => `
                <button onclick="selectMonth('${m}')" class="p-3 rounded-lg text-center hover:bg-surface-container ${m === selectedMonth ? 'bg-primary text-on-primary' : 'bg-surface-container-low'}">
                    ${m.replace('-', '年')}月
                </button>
            `).join('');
        }

        function selectMonth(month) {
            selectedMonth = month;
            closeDatePicker();
            updateBudget();
        }

        function formatCurrency(amount) {
            return '¥' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        init();
    </script>
</body>
</html>
